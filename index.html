<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/kaptur-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Kaptur — Local screenshot manager with OCR search. Find any screenshot by what it contains." />
    <title>Kaptur — Screenshot Manager</title>
    <!-- Prevent flash of wrong theme -->
    <script>
      (function() {
        var t = localStorage.getItem('kaptur-theme') || 'light';
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
